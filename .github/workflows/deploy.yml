name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Daily rebuild at 5:00 UTC (6:00 MEZ / 7:00 MESZ) for scheduled posts
    - cron: '0 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true # VERBESSERUNG 1: Bricht veraltete Builds ab, wenn man mehrmals schnell pusht

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm

      # VERBESSERUNG 2: Setup Pages konfiguriert automatisch Umgebungsvariablen wie BASE_URL
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # VERBESSERUNG 3: Caching für den Astro-Build (insbesondere für optimierte Bilder extrem hilfreich)
      - name: Cache Astro Build
        uses: actions/cache@v6
        with:
          path: |
            node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Build Astro
        run: pnpm run build

      - name: Submit to IndexNow
        run: pnpm run indexnow
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    permissions:
      pages: write      # to deploy to Pages
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
