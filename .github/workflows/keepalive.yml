name: Keepalive Workflow

on:
  schedule:
    # Runs every 45 days to prevent GitHub from disabling scheduled workflows
    # (GitHub disables cron after 60 days of repo inactivity)
    - cron: '0 12 1,15 * *'  # 1st and 15th of each month at noon UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: liskin/gh-workflow-keepalive@v1
        with:
          time_elapsed: 45
